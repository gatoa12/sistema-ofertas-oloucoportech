<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cadastro inicial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: #f6f6f4;
    color: #1a1a1a;
    max-width: 560px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #8a8a85; font-size: 13px; margin-bottom: 20px; }
  .card {
    background: #fff; border: 1px solid #eaeae6; border-radius: 14px;
    padding: 20px 22px; margin-bottom: 18px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  .card h2 { font-size: 15px; margin: 0 0 12px; }
  label { display: block; font-size: 12px; font-weight: 500; color: #6a6a65; margin: 10px 0 4px; }
  input[type=text] {
    width: 100%; padding: 9px 11px; border: 1px solid #dcdcd7; border-radius: 8px; font-size: 14px;
  }
  button {
    margin-top: 14px; padding: 10px 18px; border-radius: 8px; border: none;
    background: #1a1a1a; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
  }
  button:hover { background: #333; }
  #msgChave, .resultado { font-size: 13px; margin-top: 10px; }
  .ok { color: #1a8a4a; } .erro { color: #c0392b; }
</style>
</head>
<body>

<h1>Cadastro inicial</h1>
<div class="sub">Use esta página uma vez só, para criar a primeira loja e o primeiro grupo de teste.</div>

<div class="card">
  <h2>Sua chave de admin</h2>
  <label>ADMIN_WRITE_KEY (a mesma que você configurou no Cloudflare)</label>
  <input type="text" id="chave" placeholder="Cole aqui a sua chave" />
</div>

<div class="card">
  <h2>Cadastrar loja</h2>
  <label>Nome da loja</label>
  <input type="text" id="lojaNome" placeholder="Amazon" value="Amazon" />
  <label>Hashtag</label>
  <input type="text" id="lojaHashtag" placeholder="#amazon" value="#amazon" />
  <label>Domínios (separados por vírgula)</label>
  <input type="text" id="lojaDominios" placeholder="amazon.com.br, amzn.to" value="amazon.com.br, amzn.to" />
  <button onclick="cadastrarLoja()">Cadastrar loja</button>
  <div class="resultado" id="resultadoLoja"></div>
</div>

<div class="card">
  <h2>Cadastrar grupo</h2>
  <label>Nome do grupo</label>
  <input type="text" id="grupoNome" placeholder="Corrida SP" />
  <label>Plataforma</label>
  <select id="grupoPlataforma" style="width:100%; padding:9px 11px; border:1px solid #dcdcd7; border-radius:8px; font-size:14px;">
    <option value="whatsapp">WhatsApp</option>
    <option value="telegram">Telegram</option>
  </select>
  <label style="display:flex; align-items:center; gap:8px; margin-top:12px;">
    <input type="checkbox" id="grupoTeste" style="width:auto;" />
    Este é o grupo de teste (só você participa, recebe tudo automaticamente e NÃO aparece na lista de seleção do painel)
  </label>
  <label>ID técnico do grupo (opcional por enquanto, mas necessário pro robô enviar de verdade)</label>
  <input type="text" id="grupoIdTecnico" placeholder="WhatsApp: 55119...@g.us  |  Telegram: -1001234567890" />
  <button onclick="cadastrarGrupo()">Cadastrar grupo</button>
  <div class="resultado" id="resultadoGrupo"></div>
</div>

<script>
async function cadastrarLoja() {
  const chave = document.getElementById("chave").value;
  const el = document.getElementById("resultadoLoja");
  if (!chave) { el.innerHTML = '<span class="erro">Preencha a chave de admin primeiro.</span>'; return; }

  const dominios = document.getElementById("lojaDominios").value.split(",").map(d => d.trim()).filter(Boolean);

  try {
    const res = await fetch("/api/lojas", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${chave}` },
      body: JSON.stringify({
        nome: document.getElementById("lojaNome").value,
        hashtag: document.getElementById("lojaHashtag").value,
        dominios,
      }),
    });
    const data = await res.json();
    el.innerHTML = data.ok
      ? `<span class="ok">✅ Loja "${data.loja.nome}" cadastrada com sucesso.</span>`
      : `<span class="erro">❌ Erro: ${data.erro || "desconhecido"}</span>`;
  } catch (e) {
    el.innerHTML = `<span class="erro">❌ Falha na conexão: ${e.message}</span>`;
  }
}

async function cadastrarGrupo() {
  const chave = document.getElementById("chave").value;
  const el = document.getElementById("resultadoGrupo");
  if (!chave) { el.innerHTML = '<span class="erro">Preencha a chave de admin primeiro.</span>'; return; }

  const plataforma = document.getElementById("grupoPlataforma").value;
  const idTecnico = document.getElementById("grupoIdTecnico").value.trim();

  const corpo = {
    nome: document.getElementById("grupoNome").value,
    plataforma,
    e_grupo_teste: document.getElementById("grupoTeste").checked,
  };
  if (plataforma === "whatsapp") corpo.whatsapp_id = idTecnico || null;
  if (plataforma === "telegram") corpo.telegram_chat_id = idTecnico || null;

  try {
    const res = await fetch("/api/grupos", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${chave}` },
      body: JSON.stringify(corpo),
    });
    const data = await res.json();
    el.innerHTML = data.ok
      ? `<span class="ok">✅ Grupo "${data.grupo.nome}" cadastrado com sucesso.</span>`
      : `<span class="erro">❌ Erro: ${data.erro || "desconhecido"}</span>`;
  } catch (e) {
    el.innerHTML = `<span class="erro">❌ Falha na conexão: ${e.message}</span>`;
  }
}
</script>
</body>
</html>
